# ============================================================
# 自动部署到 Netlify — 推送 master 时触发
# 使用 @netlify/plugin-nextjs 支持 SSR + API Routes
# Netlify 自动构建，插件生成 Netlify Functions
# ============================================================
name: Deploy to Netlify

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --build --prod --message "GitHub Actions deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: eae6e33e-ad3b-4cdf-b2c4-d8c7f0186a28
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}