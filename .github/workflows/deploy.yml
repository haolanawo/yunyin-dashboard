# ============================================================
# 自动部署到 Netlify — 推送 master 时触发
# Netlify 端自动执行 netlify.toml 中的 build.command
# ============================================================
name: Deploy to Netlify

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Netlify CLI and Deploy
        run: |
          npm install -g netlify-cli
          netlify deploy --build --prod --message "GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: eae6e33e-ad3b-4cdf-b2c4-d8c7f0186a28
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
