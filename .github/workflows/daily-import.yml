# ============================================================
# 每天 8:00 (UTC+8) 自动跑数据检查
# 也支持手动触发
# ============================================================
name: Daily Data Import

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg[binary]

      - name: Verify database connection
        run: |
          python -c "
          import psycopg, os, urllib.parse
          url = os.environ['DATABASE_URL'].strip()
          print('URL scheme:', url.split(':')[0] if ':' in url else 'INVALID')
          conn = psycopg.connect(url)
          cur = conn.cursor()
          cur.execute('SELECT count(*) FROM public.contents')
          print(f'✓ Connected. contents: {cur.fetchone()[0]} rows')
          cur.execute('SELECT count(*) FROM public.writing_rules')
          print(f'✓ writing_rules: {cur.fetchone()[0]} rows')
          conn.close()
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Summary
        run: echo "✅ 每日数据检查完成 — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
