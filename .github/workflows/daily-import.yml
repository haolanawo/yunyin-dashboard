# ============================================================
# 每天 8:00 自动数据同步检查
# ============================================================
name: Daily Data Import

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test all connection methods
        run: |
          echo "=== Test 1: Direct with sslmode=require ==="
          psql "${{ secrets.DATABASE_URL_DIRECT }}?sslmode=require" -c "SELECT 1" 2>&1 || true

          echo ""
          echo "=== Test 2: Pooler session mode ==="
          psql "${{ secrets.DATABASE_URL_POOLER }}" -c "SELECT 1" 2>&1 || true

          echo ""
          echo "=== Test 3: Pooler with sslmode ==="
          psql "${{ secrets.DATABASE_URL_POOLER }}?sslmode=require" -c "SELECT 1" 2>&1 || true

      - name: Verify data tables
        if: success()
        run: |
          psql "${{ secrets.DATABASE_URL_DIRECT }}?sslmode=require" -c "
            SELECT 'contents' as tbl, count(*) FROM public.contents
            UNION ALL
            SELECT 'writing_rules', count(*) FROM public.writing_rules
            UNION ALL
            SELECT 'zhihu_accounts', count(*) FROM public.zhihu_accounts
          " 2>&1
