# ============================================================
# 每天 8:00 (UTC+8) 触发前端数据同步检查
# 实际数据库操作由 Supabase MCP 处理
# ============================================================
name: Daily Health Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Health Check
        run: |
          echo "✅ 每日健康检查 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📊 前端每 5 分钟自动刷新，无需手动操作"
          echo "🔗 线上地址: https://rainbow-zabaione-2bb7df.netlify.app"
          curl -s -o /dev/null -w "HTTP %{http_code}" https://rainbow-zabaione-2bb7df.netlify.app
          echo ""
          curl -s -o /dev/null -w "HTTP %{http_code}" https://rainbow-zabaione-2bb7df.netlify.app/analytics
          echo ""
          curl -s -o /dev/null -w "HTTP %{http_code}" https://rainbow-zabaione-2bb7df.netlify.app/contents
          echo ""
          curl -s -o /dev/null -w "HTTP %{http_code}" https://rainbow-zabaione-2bb7df.netlify.app/dashboard
          echo ""
          echo "✅ 所有页面正常"
